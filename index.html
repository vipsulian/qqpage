<!DOCTYPE HTML>
<html>
	<head>
		<title>QQ、微信防红接口 - 勿埋我心</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="is-preload">

		<!-- Header -->
			<header id="header" style="text-align: center;">
				<h1>QQ、微信防红接口</h1>
				<p>在下方输入需要跳转的链接，即可生成防红接口。<br>
					复制下方生成的链接，粘贴到微信或者QQ即可。</p>
			</header>

		<!-- Signup Form -->
			<div style="display: flex; justify-content: center; width: 100%;">
				<form id="signup-form" method="post" style="max-width: 640px; margin: 0;">
					<input type="url" name="url" id="url" placeholder="需要跳转的网址" />
					<input type="button" value="生成" onclick="build_url()"/>
				</form>
			</div>
			<p id="b_url" style="text-align: center;"></p>
			<div id="qrcode_container" style="display: none; justify-content: center; margin-top: 20px;">
				<div id="qrcode" style="background: #fff; padding: 20px; border-radius: 5px;"></div>
			</div>

			<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
			<script src="./assets/js/build_url.js"></script>

		<!-- Footer -->
			<footer id="footer">
				<ul class="icons">

					<li><a href="https://github.com/vipsulian/qqpage" class="icon brands fa-github" target="_blank"><span class="label">GitHub</span></a></li>

				</ul>
				<ul class="copyright">
					<li>&copy; Powered by <a href="https://sulian.live" target="_blank">速联</a></li>
				</ul>
			</footer>

		<!-- Scripts -->
			<script src="assets/js/main.js"></script>
	</body>
</html>
